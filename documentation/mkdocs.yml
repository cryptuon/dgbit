site_name: dgbit Documentation
site_url: https://docs.cryptuon.com/dgbit/
site_description: Algorithmic trading framework for Bybit - backtest and execute crypto trading strategies
site_author: Cryptuon Research
repo_name: cryptuon/dgbit
repo_url: https://github.com/cryptuon/dgbit
edit_uri: edit/main/documentation/docs/

copyright: Copyright &copy; 2026 Cryptuon Research

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/trending-up

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Guides:
    - guides/index.md
    - Trading Strategies: guides/strategies.md
    - Backtesting: guides/backtesting.md
    - Live Trading: guides/live-trading.md
    - Custom Strategies: guides/custom-strategies.md
  - API Reference:
    - api/index.md
    - REST API: api/rest-api.md
    - WebSocket: api/websocket.md
    - Python SDK: api/python-sdk.md
  - Deployment:
    - deployment/index.md
    - Docker: deployment/docker.md
    - Production: deployment/production.md
    - Monitoring: deployment/monitoring.md
  - Architecture:
    - architecture/index.md
    - Overview: architecture/overview.md
    - Service Bus: architecture/service-bus.md
    - Data Flow: architecture/data-flow.md
  - Reference:
    - reference/index.md
    - Configuration Options: reference/configuration.md
    - Built-in Strategies: reference/strategies-ref.md
    - Changelog: reference/changelog.md

extra:
  homepage: https://dgbit.cryptuon.com/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cryptuon/dgbit
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/dgbit/
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/cryptuon/dgbit
